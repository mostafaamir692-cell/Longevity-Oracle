packages:
  "framer-motion": "Scroll-triggered cinematic animations and transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "lucide-react": "Beautiful iconography for features and UI elements"
  "react-hook-form": "Form state management for the booking flow"
  "@hookform/resolvers": "Zod schema validation integration for booking form"
  "zod": "Type-safe schema validation"

images:
  - path: "artifacts/foy-wellness/public/images/hero-bg.png"
    description: "Abstract luxury deep dark background with subtle glowing teal and gold ethereal energy lines, cinematic lighting, 16:9"
    aspect_ratio: "16:9"
  - path: "artifacts/foy-wellness/public/images/transformation.png"
    description: "Abstract glowing orbs of teal and green light floating in deep dark space, serene and natural, glassmorphism style, 16:9"
    aspect_ratio: "16:9"

notes:
  - The API endpoint POST /api/bookings handles consultation requests
  - GET /api/bookings/services returns the available treatments for the dropdown
